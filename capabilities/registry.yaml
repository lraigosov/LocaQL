      - unit/server/routines_insert_requires_definition_body
      - unit/server/routines_require_existing_dataset
      - unit/server/routines_insert_and_patch_round_trip_arguments
    reason: "insert/get/list/patch/delete for bigquery/v2/.../routines are metadata-only: there is no SQL execution engine behind routines, so definitionBody/routineType/language round-trip without ever being executed. Routines also accept an optional arguments array ([{name, dataType}]), stored and returned as-is and surfaced via INFORMATION_SCHEMA.PARAMETERS; dataType is a flat scalar type name rather than real BigQuery's nested StandardSqlDataType, the same flat-shape simplification already used for schema.fields/externalDataConfiguration elsewhere. A patch that omits arguments leaves existing ones untouched; a patch that includes arguments replaces them wholesale"
