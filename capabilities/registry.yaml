    status: partial
    fidelity: medium
    tests:
      - unit/server/external_table_insert_requires_source_uris
      - unit/server/external_table_insert_requires_source_format
      - unit/server/external_table_insert_requires_schema
      - unit/server/external_table_insert_renders_type_and_config
      - unit/server/external_table_query_reflects_live_file_contents
      - unit/server/external_table_tabledata_list_reads_file
