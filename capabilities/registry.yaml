capabilities:
  rest.datasets.list:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/rest_datasets_list
  rest.datasets.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_get
  rest.datasets.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_insert
  rest.datasets.delete:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_delete
  rest.datasets.patch:
    status: partial
    fidelity: medium
    tests:
      - unit/server/datasets_patch
    reason: partial update for friendlyName, location and labels is supported
  rest.jobs.query:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/rest_jobs_query
  rest.datasets.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_datasets_list_pagination
  rest.tables.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_tables_list_pagination
  rest.tables.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_get
  rest.tables.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_insert
  rest.tables.delete:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_delete
  rest.tables.patch:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_patch
  rest.tables.update:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_update
  rest.jobs.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_jobs_list_pagination
  rest.pagination.page_token.opaque:
    status: supported
    fidelity: medium
    tests:
      - unit/server/pagination_opaque_page_token
    reason: list endpoints return opaque tokens and accept legacy numeric tokens for compatibility
  rest.jobs.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_insert
  rest.jobs.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_get
  rest.jobs.cancel:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_cancel
  rest.jobs.idempotency.requestId:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_request_id_idempotency
    reason: requestId behavior implemented for jobs insert subset
  rest.jobs.executors.query_load_extract_copy:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_executor_type_and_statistics
      - unit/server/jobs_copy_real_destination_data
    reason: query, load and extract remain simulated; copy jobs now materialize real destination rows in the in-memory catalog and preserve basic table shape
  rest.jobs.errors.detailed:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_detailed_errors
    reason: jobs support errorResult and secondary errors list for parity with BigQuery contract
  rest.jobs.persistence.restart:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_persistence_across_restart
    reason: optional local persistence implemented for job lifecycle state
  rest.jobs.concurrency.limits:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_worker_limit_backpressure
      - unit/server/jobs_concurrent_projects_clients
      - unit/server/jobs_concurrent_reads_during_writes
    reason: configurable worker slots add local backpressure for async jobs
  rest.storage.write.backpressure:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_storage_write_backpressure
      - unit/server/jobs_storage_write_limit_env
    reason: load and copy jobs honor dedicated storage-write worker slots
  rest.jobs.mutations.resource_serialization:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_serialize_conflicting_resource_mutations
    reason: jobs with same destination dataset and table execute sequentially for determinism
  emulator.catalog.persistence.atomic_snapshot:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_persistence_atomic_replace
    reason: state snapshot is committed via temp file replacement to avoid partial catalog writes
  rest.tabledata.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_tabledata_list_pagination
  sql.information_schema.priority:
    status: partial
    fidelity: medium
    tests:
      - unit/server/information_schema_priority_tables_columns
    reason: basic SCHEMATA, TABLES and COLUMNS query emulation is backed by the live in-memory catalog; broader semantic parity is still pending
  emulator.health:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/emulator_health
  emulator.readiness:
    status: supported
    fidelity: high
    tests:
      - unit/server/emulator_readiness
  emulator.version:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/emulator_version
  console.ui.service:
    status: partial
    fidelity: medium
    tests:
      - unit/ui/proxy_rewrite
      - unit/ui/config_endpoint
    reason: standalone UI service proxies emulator APIs and adapts views using capabilities
  console.ui.shortcuts:
    status: partial
    fidelity: medium
    reason: keyboard shortcuts for run and save are available in SQL editor with local bindings
  console.ui.explorer.search:
    status: partial
    fidelity: medium
    reason: explorer supports local search by project, dataset and table names over cached resources
  console.ui.saved_queries.versioning:
    status: partial
    fidelity: medium
    reason: saved queries keep local version history per query name and allow navigating versions
  console.ui.saved_queries.import_export:
    status: partial
    fidelity: medium
    reason: saved queries can be exported and imported as JSON in local console
  console.ui.saved_queries.share_link:
    status: partial
    fidelity: medium
    reason: saved query text can be shared via local URL query parameter
  console.ui.table_details.preview_schema_metadata:
    status: partial
    fidelity: medium
    reason: selecting a table opens metadata, schema, preview rows and raw JSON details backed by tables.get and tabledata.list
  console.ui.navigation.menus_functional:
    status: partial
    fidelity: medium
    reason: appbar and side navigation actions are wired to emulator-backed views for search, jobs, history and capabilities
  console.ui.table_actions.query_copy_delete:
    status: partial
    fidelity: medium
    reason: table details panel provides query draft, copy job submission and delete table actions through emulator endpoints
  console.ui.jobs.history_tabs:
    status: partial
    fidelity: medium
    reason: jobs explorer supports explicit personal and project history tabs mapped to allUsers behavior
