      - unit/server/tables_inherits_dataset_default_table_expiration_ms
      - unit/server/tables_expire_and_are_purged_after_expiration_time
      - unit/server/dataset_delete_table_count_excludes_expired_tables
    reason: partial update for friendlyName, location, labels and defaultTableExpirationMs is supported; defaultTableExpirationMs is stored and round-tripped (accepts both string and number input, rendered as a string per the BigQuery int64-as-string convention) and now enforced — every table created without an explicit expirationTime inherits an absolute expiration computed from the dataset's default at creation time via a swappable clock (tableService.now, real time.Now in production, overridable in tests), and any table access (get/list/tabledata/dataset-empty-check) lazily purges an expired table the first time it is touched rather than running a background sweep goroutine. This is a narrowly-scoped clock for table expiration specifically, not the general injectable-clock/observability infrastructure envisioned in the master plan's Fase quince (logging, time travel, sessions still use real wall-clock time directly)
