      - unit/server/external_table_information_schema_tables_marks_type_external
      - unit/server/external_table_copy_job_materializes_into_destination
    reason: "tables.insert accepts externalDataConfiguration (sourceUris/sourceFormat/fieldDelimiter/skipLeadingRows, mirroring configuration.load's flat field layout instead of real BigQuery's nested csvOptions) with an explicit schema.fields required (no autodetect); nothing is materialized at creation time — every consumer of real row data (query execution, tabledata.list, copy/extract job sources, INFORMATION_SCHEMA.PARTITIONS row counts) re-reads sourceUris fresh through a single resolveTableRows choke point, so external tables always reflect current file contents. An unreadable source fails the request/job explicitly instead of silently falling back to empty or simulated data. Supported sourceFormat values are the same four as load/extract (NEWLINE_DELIMITED_JSON/CSV/AVRO/PARQUET); ORC and other formats, patching externalDataConfiguration after creation, autodetect, Hive partitioning and compression options are not supported"
  rest.fake_gcs.json_api:
    status: partial
    fidelity: medium
    tests:
      - unit/server/gcs_buckets_insert_and_list
      - unit/server/gcs_object_upload_get_download_delete
      - unit/server/gcs_object_name_with_slashes_acts_as_pseudo_directory
      - unit/server/gcs_list_objects_with_prefix
      - unit/server/gcs_and_load_extract_gs_uris_interoperate
      - unit/server/gcs_requires_fake_gcs_root_configured
      - unit/server/gcs_upload_rejects_unsupported_upload_type
    reason: "a minimal, real-contract-compatible subset of the Google Cloud Storage JSON API is exposed on the same host:port as the rest of this server (/storage/v1/b and /upload/storage/v1/b), backed by LOCAQL_FAKE_GCS_ROOT using the same bucket/object path-join convention as resolveFakeGCSPath (bigquery.go), so it interoperates with gs:// sourceUris/destinationUris in load/extract/external tables — verified with a test that uploads via this API and loads the same object via a gs:// job. Implemented: buckets.insert/list/get; objects.insert via both media (uploadType=media, data-only body) and multipart (uploadType=multipart, multipart/related body) upload variants, objects.get (metadata and ?alt=media download), objects.list (with optional prefix filter), objects.delete. Verified against the real cloud.google.com/go/storage client via STORAGE_EMULATOR_HOST, not just this project's own tests: bucket create and object upload work as-is, and that run is what proved multipart had to be implemented — the official client's ObjectHandle.NewWriter does not default to media. object.NewReader (download) failed in that same run, but the request never reached this server: the official client has an open, P1-tagged upstream bug where NewReader ignores STORAGE_EMULATOR_HOST/endpoint overrides and calls real GCS instead (googleapis/google-cloud-go#1619), unrelated to this server's correctness — the download/list/delete paths are instead verified directly via this project's own HTTP-level test suite. Not implemented, matching real fields/paths rather than inventing partial ones: resumable uploads (explicit 501), IAM/ACLs, object versioning/generations, lifecycle rules, notifications, signed URLs"
