  rest.jobs.executors.query_load_extract_copy:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_executor_type_and_statistics
      - unit/server/jobs_copy_real_destination_data
      - unit/server/extract_job_compression_shrinks_avro_and_parquet_output
      - unit/server/extract_job_compression_shrinks_gzipped_csv
      - unit/server/extract_job_rejects_unsupported_compression_for_format
      - unit/server/load_job_round_trips_gzip_compressed_csv_source_rows
      - unit/server/load_job_rejects_compression_for_avro_and_parquet_source_format
      - unit/server/extract_job_splits_into_multiple_shards_when_over_threshold
      - unit/server/extract_job_rejects_multi_shard_result_without_wildcard_uri
      - unit/server/extract_job_rejects_multi_shard_result_with_multiple_literal_uris
    reason: query jobs resolve against the live in-memory catalog and report real outputRows/processedBytes (totalSlotMs stays a synthetic constant by design, since real slot/reservation timing is a declared non-goal); copy jobs materialize destination rows; load jobs materialize destination table schema and, when sourceUris are given, ingest real rows from NEWLINE_DELIMITED_JSON, CSV, AVRO or PARQUET (sourceFormat-dispatched, with fieldDelimiter/skipLeadingRows for CSV); extract jobs read a real source table and write destinationUris in the same four formats (fieldDelimiter/printHeader for CSV). Avro uses github.com/linkedin/goavro/v2 (Apache 2.0); Parquet uses github.com/parquet-go/parquet-go (Apache 2.0, requires Go 1.24.9+, bumped from 1.22 explicitly for this). sourceUris/destinationUris are local file paths by default; gs:// URIs resolve onto a local directory only when LOCAQL_FAKE_GCS_ROOT is set (a LocaQL-only local-disk mapping, not a GCS-compatible API), otherwise gs:// is rejected explicitly. Multi-wildcard destinationUris and ORC are rejected explicitly, not silently ignored. configuration.load.compression and configuration.extract.compression are now wired — GZIP for CSV/NDJSON (both directions); on extract only, SNAPPY/DEFLATE for AVRO (goavro OCF codecs) and SNAPPY/GZIP for PARQUET (parquet-go codecs), verified by comparing extracted file sizes with/without compression rather than just checking the file decodes (both libraries decode any codec transparently regardless of what was requested, so decoding alone wouldn't prove the codec was honored). AVRO/PARQUET on load never accept a non-NONE compression value, since their codec is embedded in the file and auto-detected on read, so the field would be a silent no-op there and is rejected explicitly instead. External tables' externalDataConfiguration does not expose compression yet. A single '*' wildcard in destinationUris now resolves to a real multi-shard writer instead of always forcing a single 000000000000 file — by default (LOCAQL_EXTRACT_SHARD_MAX_BYTES unset) every row still lands in one shard, unchanged; once that env var is set, exceeding it splits the encoded result across sequentially-numbered shard files, each independently valid per format (CSV repeats its header per shard when printHeader is set). A result that needs splitting but has no wildcard, or more than one destinationUris entry, fails explicitly rather than silently picking one destination or duplicating shards. There is still no size-based split for the LOCAQL_FAKE_GCS_ROOT/gs:// case beyond the same local-path mapping, and the threshold is local-only tuning, not BigQuery's real ~1GB-per-file behavior
