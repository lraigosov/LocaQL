capabilities:
  rest.datasets.list:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/rest_datasets_list
  rest.datasets.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_get
  rest.datasets.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_insert
  rest.datasets.delete:
    status: supported
    fidelity: medium
    tests:
      - unit/server/datasets_delete
      - unit/server/dataset_delete_requires_delete_contents_when_tables_exist
    reason: deleting a dataset that still has tables requires explicit deleteContents=true, matching the real BigQuery contract; the cascade removes the tables tracked for that dataset
  rest.datasets.undelete:
    status: supported
    fidelity: low
    tests:
      - unit/server/dataset_undelete_restores_metadata_not_contents
      - unit/server/dataset_undelete_fails_without_tombstone
      - unit/server/dataset_undelete_fails_if_dataset_already_exists
    reason: "LocaQL-only convenience endpoint at /_emulator/datasets/undelete (POST), deliberately outside /bigquery/v2/ since BigQuery's REST API has no public dataset undelete contract; restores friendlyName/location/labels/defaultTableExpirationMs from the most recent delete's tombstone, never table contents"
  rest.datasets.patch:
    status: partial
    fidelity: medium
    tests:
      - unit/server/datasets_patch
      - unit/server/datasets_default_table_expiration_ms_round_trip
    reason: partial update for friendlyName, location, labels and defaultTableExpirationMs is supported; defaultTableExpirationMs is stored and round-tripped (accepts both string and number input, rendered as a string per the BigQuery int64-as-string convention) but not yet enforced — no expiry sweep exists, since that needs an injectable clock (tracked separately)
  rest.jobs.query:
    status: supported
    fidelity: high
    tests:
      - conformance/foundation/rest_jobs_query
  rest.datasets.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_datasets_list_pagination
  rest.tables.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_tables_list_pagination
  rest.tables.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_get
  rest.tables.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_insert
  rest.tables.delete:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_delete
  rest.tables.patch:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_patch
  rest.tables.update:
    status: supported
    fidelity: medium
    tests:
      - unit/server/tables_update
  rest.tables.external_data_configuration:
    status: partial
    fidelity: medium
    tests:
      - unit/server/external_table_insert_requires_source_uris
      - unit/server/external_table_insert_requires_source_format
      - unit/server/external_table_insert_requires_schema
      - unit/server/external_table_insert_renders_type_and_config
      - unit/server/external_table_query_reflects_live_file_contents
      - unit/server/external_table_tabledata_list_reads_file
      - unit/server/external_table_unreadable_source_fails_query_explicitly
      - unit/server/external_table_information_schema_tables_marks_type_external
      - unit/server/external_table_copy_job_materializes_into_destination
    reason: "tables.insert accepts externalDataConfiguration (sourceUris/sourceFormat/fieldDelimiter/skipLeadingRows, mirroring configuration.load's flat field layout instead of real BigQuery's nested csvOptions) with an explicit schema.fields required (no autodetect); nothing is materialized at creation time — every consumer of real row data (query execution, tabledata.list, copy/extract job sources, INFORMATION_SCHEMA.PARTITIONS row counts) re-reads sourceUris fresh through a single resolveTableRows choke point, so external tables always reflect current file contents. An unreadable source fails the request/job explicitly instead of silently falling back to empty or simulated data. Supported sourceFormat values are the same four as load/extract (NEWLINE_DELIMITED_JSON/CSV/AVRO/PARQUET); ORC and other formats, patching externalDataConfiguration after creation, autodetect, Hive partitioning and compression options are not supported"
  rest.jobs.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_jobs_list_pagination
  rest.pagination.page_token.opaque:
    status: supported
    fidelity: medium
    tests:
      - unit/server/pagination_opaque_page_token
    reason: list endpoints return opaque tokens and accept legacy numeric tokens for compatibility
  rest.jobs.insert:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_insert
  rest.jobs.get:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_get
  rest.jobs.cancel:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_cancel
  rest.jobs.idempotency.requestId:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_request_id_idempotency
    reason: requestId behavior implemented for jobs.insert and queries endpoint with TTL-based replay window
  rest.jobs.executors.query_load_extract_copy:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_executor_type_and_statistics
      - unit/server/jobs_copy_real_destination_data
    reason: query jobs resolve against the live in-memory catalog and report real outputRows/processedBytes (totalSlotMs stays a synthetic constant by design, since real slot/reservation timing is a declared non-goal); copy jobs materialize destination rows; load jobs materialize destination table schema and, when sourceUris are given, ingest real rows from NEWLINE_DELIMITED_JSON, CSV, AVRO or PARQUET (sourceFormat-dispatched, with fieldDelimiter/skipLeadingRows for CSV); extract jobs read a real source table and write destinationUris in the same four formats (fieldDelimiter/printHeader for CSV), with single-shard wildcard destinationUris resolved to the BigQuery 000000000000 convention. Avro uses github.com/linkedin/goavro/v2 (Apache 2.0); Parquet uses github.com/parquet-go/parquet-go (Apache 2.0, requires Go 1.24.9+, bumped from 1.22 explicitly for this). sourceUris/destinationUris are local file paths by default; gs:// URIs resolve onto a local directory only when LOCAQL_FAKE_GCS_ROOT is set (a LocaQL-only local-disk mapping, not a GCS-compatible API), otherwise gs:// is rejected explicitly. Multi-wildcard destinationUris and ORC are rejected explicitly, not silently ignored
  rest.routines.crud:
    status: supported
    fidelity: medium
    tests:
      - unit/server/routines_insert_get_patch_delete_lifecycle
      - unit/server/routines_insert_requires_definition_body
      - unit/server/routines_require_existing_dataset
    reason: "insert/get/list/patch/delete for bigquery/v2/.../routines are metadata-only: there is no SQL execution engine behind routines, so definitionBody/routineType/language round-trip without ever being executed"
  rest.models.crud:
    status: supported
    fidelity: medium
    tests:
      - unit/server/models_insert_get_patch_delete_lifecycle
      - unit/server/models_require_existing_dataset
    reason: "insert/get/list/patch/delete for bigquery/v2/.../models are metadata-only: there is no ML training/inference backend, so modelType/friendlyName/description/labels round-trip without ever training or scoring; trainingRuns/evaluation metrics are never fabricated"
  rest.jobs.errors.detailed:
    status: supported
    fidelity: medium
    tests:
      - unit/server/jobs_detailed_errors
    reason: jobs support errorResult and secondary errors list for parity with BigQuery contract
  rest.jobs.persistence.restart:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_persistence_across_restart
    reason: optional local persistence implemented for job lifecycle state
  rest.jobs.concurrency.limits:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_worker_limit_backpressure
      - unit/server/jobs_concurrent_projects_clients
      - unit/server/jobs_concurrent_reads_during_writes
    reason: configurable worker slots add local backpressure for async jobs
  rest.storage.write.backpressure:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_storage_write_backpressure
      - unit/server/jobs_storage_write_limit_env
    reason: load and copy jobs honor dedicated storage-write worker slots
  rest.jobs.mutations.resource_serialization:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_serialize_conflicting_resource_mutations
    reason: jobs with same destination dataset and table execute sequentially for determinism
  emulator.catalog.persistence.atomic_snapshot:
    status: partial
    fidelity: medium
    tests:
      - unit/server/jobs_persistence_atomic_replace
    reason: state snapshot is committed via temp file replacement to avoid partial catalog writes
  rest.tabledata.list.pagination:
    status: supported
    fidelity: medium
    tests:
      - conformance/pagination/rest_tabledata_list_pagination
  sql.information_schema.priority:
    status: partial
    fidelity: medium
    tests:
      - unit/server/information_schema_priority_tables_columns
      - unit/server/information_schema_priority_jobs
      - unit/server/information_schema_priority_partitions
    reason: SCHEMATA, SCHEMATA_OPTIONS, TABLES, COLUMNS, TABLE_OPTIONS, JOBS, JOBS_BY_PROJECT, JOBS_BY_USER, PARTITIONS, ROUTINES and MODELS query emulation is backed by the live in-memory catalog. JOBS_BY_USER scopes to the UserEmail of the job running the JOBS_BY_USER query itself (the only real "calling user" available; the emulator is anonymous-only and has no broader auth model), returning zero rows rather than all jobs when that job has no UserEmail. VIEWS returns a structurally correct empty result since views are not a real resource yet; broader semantic parity is still pending
  console.ui.resource_forms.basic:
    status: supported
    fidelity: medium
    tests:
      - e2e/ui/dataset_forms_basic_lifecycle
    reason: explorer supports validated dataset create/update/delete (with labels and defaultTableExpirationMs), a dataset delete flow that detects non-empty datasets and retries with deleteContents=true, a Dataset Undelete form, basic table creation, table metadata editing, table labels editing and a selected-dataset summary panel against emulator REST endpoints; verified end-to-end against a real headless-Chrome console, not just by reading the code
  console.ui.external_tables:
    status: supported
    fidelity: medium
    tests:
      - e2e/ui/external_tables_form
    reason: a dedicated Explorer form creates external tables (schema.fields JSON, sourceUris, sourceFormat select, CSV fieldDelimiter/skipLeadingRows) against tables.insert's externalDataConfiguration (see rest.tables.external_data_configuration); the table details panel shows Type EXTERNAL plus a raw External Data Configuration block, and the Explorer tree marks external table nodes with an "(external)" suffix. Preview/query/copy/extract from the UI read the same live file contents as a direct API call, since they go through the same backend endpoints; verified end-to-end against a real headless-Chrome console, not just by reading the code
